<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ChispezaWifi - Portal de Pagos</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 380px; overflow: hidden; text-align: center; }
        .header-banner { background-color: #003399; padding: 20px; color: white; }
        .content-body { padding: 25px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #ff6600; color: white; border: none; font-weight: bold; cursor: pointer; }

        /* Animación de Carga */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #ff6600;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-screen p { font-size: 0.85rem; color: #003399; font-weight: bold; }

        /* Interfaz Bancaria */
        .user-summary { text-align: left; margin-bottom: 20px; }
        .balance-card { background: linear-gradient(135deg, #003399 0%, #00256e 100%); color: white; padding: 20px; border-radius: 12px; text-align: left; margin-bottom: 20px; }
        .amount { font-size: 2.2rem; font-weight: bold; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: left; }
        .negative { color: #d9534f; font-weight: bold; text-align: right; }
        #timer { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-banner"><h2>ChispezaWifi ⚡</h2></div>
        <div class="content-body">
            
            <div id="login-section">
                <h3 id="timer"></h3>
                <input type="text" id="rut" placeholder="RUT (12345678-9)">
                <input type="password" id="pass" placeholder="Contraseña">

                <div id="loading-screen" style="display: none;">
                    <div class="spinner"></div>
                    <p>Validando credenciales...</p>
                </div>

                <button id="btn-ingresar" onclick="login()">INGRESAR</button>
                <p id="error-msg" style="color:red; font-size:0.8rem;"></p>
            </div>

            <div id="payment-section" style="display: none;">
                <div class="user-summary">
                    <p>Hola, <strong id="user-name"></strong></p>
                    <span id="user-rut-display" style="color:#666;"></span>
                </div>
                <div class="balance-card">
                    <span style="font-size:0.8rem;">Saldo Total</span>
                    <div class="amount">$75.000</div>
                    <span style="font-size:0.7rem; background:rgba(255,255,255,0.2); padding:2px 8px; border-radius:10px;">Vence: 05 Mayo</span>
                </div>
                <table class="history-table">
                    <tr><td>10 Abr - Pago Webpay</td><td class="negative">-$75.000</td></tr>
                    <tr><td>05 Mar - Pago Webpay</td><td class="negative">-$75.000</td></tr>
                </table>
                <button onclick="alert('Pagando...')">PAGAR AHORA</button>
                <button onclick="location.reload()" style="background:#eee; color:#333; margin-top:10px;">Cerrar Sesión</button>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
